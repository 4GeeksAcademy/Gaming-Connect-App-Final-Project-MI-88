<svg viewBox="0 0 500 200" xmlns="http://www.w3.org/2000/svg" width="500" height="200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#122212"/>
      <stop offset="100%" style="stop-color:#183018"/>
    </linearGradient>

    <linearGradient id="neonGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d4ffd4"/>
      <stop offset="35%" style="stop-color:#39ff14"/>
      <stop offset="100%" style="stop-color:#18b800"/>
    </linearGradient>

    <linearGradient id="neonWordmark" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#20dd00"/>
      <stop offset="100%" style="stop-color:#afffaf"/>
    </linearGradient>

    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="shieldGlow" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="letterGlow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="3.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Clip to shield so letters don't bleed outside -->
    <clipPath id="shieldClip">
      <polygon points="90,18 142,46 142,114 90,158 38,114 38,46"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="500" height="200" rx="14" fill="url(#bgGrad)"/>

  <!-- Subtle grid -->
  <line x1="0" y1="66" x2="500" y2="66" stroke="#2a4a2a" stroke-width="0.5" opacity="0.3"/>
  <line x1="0" y1="133" x2="500" y2="133" stroke="#2a4a2a" stroke-width="0.5" opacity="0.3"/>
  <line x1="166" y1="0" x2="166" y2="200" stroke="#2a4a2a" stroke-width="0.5" opacity="0.3"/>
  <line x1="333" y1="0" x2="333" y2="200" stroke="#2a4a2a" stroke-width="0.5" opacity="0.3"/>

  <!-- Shield outer glow ring -->
  <polygon points="90,14 146,44 146,116 90,162 34,116 34,44"
    fill="none" stroke="#39ff14" stroke-width="1" opacity="0.25" filter="url(#shieldGlow)"/>

  <!-- Shield body -->
  <polygon points="90,18 142,46 142,114 90,158 38,114 38,46"
    fill="#0e2010" stroke="#39ff14" stroke-width="2.5" filter="url(#shieldGlow)"/>

  <!-- GU monogram as bold text glyphs, centered in shield and clipped -->
  <g clip-path="url(#shieldClip)" filter="url(#letterGlow)">
    <text
      x="90"
      y="110"
      text-anchor="middle"
      font-family="'Trebuchet MS', 'Arial Black', 'Franklin Gothic Medium', sans-serif"
      font-size="76"
      font-weight="900"
      fill="url(#neonGrad)"
      letter-spacing="-4"
    >GU</text>
  </g>

  <!-- Divider line -->
  <line x1="164" y1="28" x2="164" y2="172" stroke="#39ff14" stroke-width="1" opacity="0.2"/>

  <!-- Wordmark -->
  <text
    x="180"
    y="112"
    font-family="'Trebuchet MS', 'Franklin Gothic Medium', 'Arial Narrow', sans-serif"
    font-size="70"
    font-weight="900"
    letter-spacing="-1"
    fill="url(#neonWordmark)"
    filter="url(#glow)"
  >GuildUp</text>

  <!-- Tagline -->
  <text
    x="182"
    y="140"
    font-family="'Courier New', monospace"
    font-size="10.5"
    letter-spacing="5"
    fill="#39ff14"
    opacity="0.65"
  >CONNECT · PLAY · CONQUER</text>

</svg>
